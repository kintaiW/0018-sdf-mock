name: Release

# 触发条件：推送形如 v0.1.0、v1.2.3 的 tag 时自动构建并发布 Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发（用于调试）

permissions:
  contents: write  # 创建 Release 需要 write 权限

jobs:
  build-linux:
    # Reason: ubuntu-20.04 runner 已被 GitHub 于 2025-04-15 下线，无法排上队列；
    # ubuntu:20.04 容器镜像也无法拉取，改用 ubuntu:22.04 容器
    # （CentOS 7/8、Debian 11+、Ubuntu 20.04+ 均可使用产出的 .so）
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
      options: --user root

    steps:
      - name: Install system deps
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            curl ca-certificates build-essential pkg-config git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Reason: container 内无 rustup；dtolnay/rust-toolchain action 依赖 host 工具链，在容器内不可用
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run tests
        run: cargo test --release

      - name: Build release dynamic library
        run: cargo build --release

      - name: Package release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG_NAME="sdf-mock-${VERSION}-linux-x86_64"
          mkdir -p "release/${PKG_NAME}"

          # 动态库
          cp target/release/libsdf_mock.so "release/${PKG_NAME}/"

          # C 头文件
          cp sdf.h "release/${PKG_NAME}/"

          # 示例配置（动态库加载时必需）
          cp config.toml "release/${PKG_NAME}/"
          cp mock_keys.toml "release/${PKG_NAME}/"

          # C 示例代码
          mkdir -p "release/${PKG_NAME}/examples"
          cp -r examples/c_caller "release/${PKG_NAME}/examples/"
          cp -r examples/demos "release/${PKG_NAME}/examples/"

          # 集成测试代码
          mkdir -p "release/${PKG_NAME}/tests"
          cp tests/integration_test.rs "release/${PKG_NAME}/tests/"

          # README
          cp README.md "release/${PKG_NAME}/"

          # 打包为 tar.gz
          cd release
          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          ls -lh "${PKG_NAME}.tar.gz"

      - name: Create GitHub Release
        # Reason: softprops/action-gh-release 支持从 tag 自动创建 Release 并附加产物
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/*.tar.gz
          generate_release_notes: true
          body: |
            ## SDF Mock SDK ${{ github.ref_name }}

            GM/T 0018-2023 服务器密码机接口纯软件模拟库。

            ### 📦 下载说明

            下载 `sdf-mock-${{ github.ref_name }}-linux-x86_64.tar.gz` 后解压即可使用：

            ```
            sdf-mock-${{ github.ref_name }}-linux-x86_64/
            ├── libsdf_mock.so          # 动态库
            ├── sdf.h                   # C 头文件
            ├── config.toml             # 日志配置（必需）
            ├── mock_keys.toml          # 密钥配置（可选）
            ├── examples/
            │   ├── c_caller/           # C 调用示例 + Makefile
            │   └── demos/              # 机密性/完整性/身份认证示例
            ├── tests/
            │   └── integration_test.rs # Rust 集成测试
            └── README.md
            ```

            ### 🚀 快速开始

            ```bash
            tar -xzf sdf-mock-${{ github.ref_name }}-linux-x86_64.tar.gz
            cd sdf-mock-${{ github.ref_name }}-linux-x86_64
            cd examples/c_caller && make && ./demo
            ```

            **详细文档**：https://kintaiw.github.io/0018-sdf-mock/

            ### ⚠️ 注意事项

            - 构建环境：Ubuntu 22.04 容器（glibc 2.31+）
            - 仅供开发测试，配置文件中的示例密钥严禁用于生产环境
